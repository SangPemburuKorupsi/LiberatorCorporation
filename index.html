    let currentUser = localStorage.getItem('pustaka_user') || null;
    let stars = parseInt(localStorage.getItem('stars')) || 0;
    let purchasedIds = JSON.parse(localStorage.getItem('purchased_stories') || "[1]");
    let currentStory = null;
    let currentPage = 0;
    let pages = [];

    function handleLogin() {
        const input = document.getElementById('usernameInput').value.trim();
        if(!input) return;
        localStorage.setItem('pustaka_user', input);
        currentUser = input;
        initApp();
    }

    function initApp() {
        if(!currentUser) return;
        document.getElementById('loginOverlay').classList.add('hide');
        document.getElementById('userNameLabel').innerText = `${currentUser}`;
        document.getElementById('starCounter').innerText = `⭐ ${stars}`;
        renderAll();
    }

    setInterval(() => {
        if(currentUser) {
            stars++;
            document.getElementById('starCounter').innerText = `⭐ ${stars}`;
            localStorage.setItem('stars', stars);
        }
    }, 10000);

    // Fungsi Render Utama
    function renderAll() {
        const rakQuery = document.getElementById('searchRak').value.toLowerCase();
        const tokoQuery = document.getElementById('searchToko').value.toLowerCase();
        
        const shelf = document.getElementById('storyShelf');
        const shop = document.getElementById('shopShelf');
        
        shelf.innerHTML = "";
        shop.innerHTML = "";

        stories.forEach(s => {
            const isPurchased = purchasedIds.includes(s.id);
            
            if(isPurchased) {
                if(s.title.toLowerCase().includes(rakQuery)) {
                    const card = document.createElement('div');
                    card.className = 'story-card';
                    card.innerHTML = `<h3>${s.title}</h3><p style="font-size:0.7rem; margin-top:10px; color:#ff7bcb;">Buka Cerita ➔</p>`;
                    card.onclick = () => openStory(s);
                    shelf.appendChild(card);
                }
            } else {
                if(s.title.toLowerCase().includes(tokoQuery)) {
                    const card = document.createElement('div');
                    card.className = 'story-card';
                    card.innerHTML = `<h3 style="opacity:0.6">${s.title}</h3><button class="btn-buy" onclick="buyStory(${s.id}, ${s.price})">Beli (⭐ ${s.price})</button>`;
                    shop.appendChild(card);
                }
            }
        });

        if(shelf.innerHTML === "") shelf.innerHTML = "<p style='font-size:0.8rem; color:gray; padding:10px;'>Tidak ada buku.</p>";
        if(shop.innerHTML === "") shop.innerHTML = "<p style='font-size:0.8rem; color:gray; padding:10px;'>Toko kosong.</p>";
    }

    // Event listener untuk kotak pencarian
    document.getElementById('searchRak').oninput = renderAll;
    document.getElementById('searchToko').oninput = renderAll;

    function buyStory(id, price) {
        if(stars >= price) {
            stars -= price;
            purchasedIds.push(id);
            localStorage.setItem('stars', stars);
            localStorage.setItem('purchased_stories', JSON.stringify(purchasedIds));
            document.getElementById('starCounter').innerText = `⭐ ${stars}`;
            renderAll();
        } else {
            alert("Bintang kurang!");
        }
    }

    // --- Reader Logic ---
    function splitText(text, size = 1000) {
        const chunks = [];
        for (let i = 0; i < text.length; i += size) {
            chunks.push(text.substring(i, i + size));
        }
        return chunks;
    }

    function openStory(story) {
        currentStory = story;
        pages = splitText(story.text, 10000);
        const savedPos = localStorage.getItem(`save_${currentUser}_${story.id}`);
        currentPage = savedPos ? parseInt(savedPos) : 0;
        document.getElementById('lobbySection').classList.add('hide');
        document.getElementById('readerSection').classList.remove('hide');
        document.getElementById('readerStoryTitle').innerText = story.title;
        updatePage();
        renderComments();
    }

    function updatePage() {
        const display = document.getElementById('storyContentDisplay');
        display.classList.add('fade-out');
        setTimeout(() => {
            let content = pages[currentPage];
            if (currentPage < pages.length - 1) content += "-";
            display.innerText = content;
            document.getElementById('pageIndicator').innerText = `${currentPage + 1} / ${pages.length}`;
            document.getElementById('prevPageBtn').classList.toggle('disabled', currentPage === 0);
            document.getElementById('nextPageBtn').classList.toggle('disabled', currentPage === pages.length - 1);
            localStorage.setItem(`save_${currentUser}_${currentStory.id}`, currentPage);
            display.classList.remove('fade-out');
        }, 300);
    }

    function nextPage() { if(currentPage < pages.length-1) { currentPage++; updatePage(); } }
    function prevPage() { if(currentPage > 0) { currentPage--; updatePage(); } }
    function backToLobby() { 
        document.getElementById('lobbySection').classList.remove('hide');
        document.getElementById('readerSection').classList.add('hide');
    }

    function addComment() {
        const input = document.getElementById('inputKomentar');
        if(!input.value) return;
        let comments = JSON.parse(localStorage.getItem('pustaka_comments') || "[]");
        comments.push({ storyId: currentStory.id, user: currentUser, text: input.value });
        localStorage.setItem('pustaka_comments', JSON.stringify(comments));
        input.value = "";
        renderComments();
    }

    function renderComments() {
        const list = document.getElementById('commentList');
        const comments = JSON.parse(localStorage.getItem('pustaka_comments') || "[]");
        list.innerHTML = comments.filter(c => c.storyId === currentStory.id)
                         .map(c => `<div class="comment-item"><b>${c.user}:</b> ${c.text}</div>`).join('');
        list.scrollTop = list.scrollHeight;
    }

    if(currentUser) initApp();
</script>
